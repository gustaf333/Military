<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGINT // Global Military Event Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0c10;--panel:rgba(10,14,20,0.94);--bdr:#1a2235;--bdr2:#2a3a55;--red:#ff3344;--org:#ff8822;--yel:#ffcc00;--blu:#00aaff;--grn:#00ff88;--cyn:#00eedd;--t1:#c8d0e0;--t2:#556680;--t3:#e8eef8}
body{background:#1a1d23;color:var(--t1);font-family:'Rajdhani',sans-serif;overflow:hidden;height:100vh;width:100vw}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,170,255,0.03) 2px,rgba(0,170,255,0.03) 4px);pointer-events:none;z-index:9999}
#map{position:absolute;inset:0;z-index:1;background:#1a1d23}
.leaflet-control-attribution,.leaflet-control-zoom{display:none!important}
.leaflet-tile-pane{display:none!important}
.vignette{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.5) 100%)}
.grid-overlay{position:absolute;inset:0;z-index:2;pointer-events:none;background-image:linear-gradient(rgba(0,170,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,170,255,0.02) 1px,transparent 1px);background-size:80px 80px}
.top-bar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--panel);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:1000;backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:28px;height:28px;border:2px solid var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:pb 2s ease-in-out infinite}
.logo-icon::before{content:'\2B21';color:var(--red);font-size:12px}
@keyframes pb{0%,100%{border-color:var(--red);box-shadow:0 0 8px rgba(255,51,68,.3)}50%{border-color:var(--org);box-shadow:0 0 16px rgba(255,51,68,.5)}}
.logo-text{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:4px;color:var(--t3)}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:2px;margin-left:12px}
.status-bar{display:flex;align-items:center;gap:20px}
.status-item{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--t2)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:bl 1.5s ease-in-out infinite}
.status-dot.scanning{background:var(--org);animation:bl .4s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.event-count{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--cyn)}
.side-panel{position:fixed;top:48px;left:0;bottom:0;width:330px;background:var(--panel);border-right:1px solid var(--bdr);z-index:1000;backdrop-filter:blur(16px);display:flex;flex-direction:column;transition:transform .3s ease}
.side-panel.collapsed{transform:translateX(-330px)}
.panel-toggle{position:fixed;top:60px;left:330px;z-index:1001;width:26px;height:44px;background:var(--panel);border:1px solid var(--bdr);border-left:none;border-radius:0 5px 5px 0;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .3s ease}
.panel-toggle:hover{color:var(--cyn);border-color:var(--cyn)}
.side-panel.collapsed+.panel-toggle{left:0}
.panel-header{padding:14px 16px;border-bottom:1px solid var(--bdr)}
.panel-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--cyn);margin-bottom:10px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.filter-btn{padding:3px 9px;border:1px solid var(--bdr);border-radius:3px;background:transparent;color:var(--t2);font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.filter-btn:hover{border-color:var(--blu);color:var(--blu)}
.filter-btn.active{border-color:var(--cyn);color:var(--cyn);background:rgba(0,238,221,.08)}
.event-list{flex:1;overflow-y:auto;padding:8px}
.event-list::-webkit-scrollbar{width:3px}.event-list::-webkit-scrollbar-track{background:transparent}.event-list::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.event-card{padding:11px;border:1px solid var(--bdr);border-left:3px solid var(--red);border-radius:4px;margin-bottom:5px;cursor:pointer;transition:all .2s;background:rgba(8,10,16,.7)}
.event-card:hover{background:rgba(20,28,44,.8);border-color:var(--bdr2)}
.event-card.type-airstrike{border-left-color:var(--red)}.event-card.type-movement{border-left-color:var(--org)}.event-card.type-incident{border-left-color:var(--yel)}.event-card.type-naval{border-left-color:var(--blu)}
.event-card-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:5px}
.event-type-badge{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:2px 6px;border-radius:2px;background:rgba(255,51,68,.12);color:var(--red)}
.event-type-badge.movement{background:rgba(255,136,34,.12);color:var(--org)}.event-type-badge.incident{background:rgba(255,204,0,.12);color:var(--yel)}.event-type-badge.naval{background:rgba(0,170,255,.12);color:var(--blu)}
.event-time{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2)}
.event-card-title{font-size:13px;font-weight:600;color:var(--t3);line-height:1.3;margin-bottom:3px}
.event-card-location{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2)}
.event-marker{position:relative;cursor:pointer}
.marker-dot{width:12px;height:12px;border-radius:50%;background:var(--red);border:2px solid rgba(255,51,68,.4);box-shadow:0 0 10px rgba(255,51,68,.6),0 0 20px rgba(255,51,68,.2);animation:mp 2s ease-in-out infinite}
.marker-dot.type-airstrike{background:#ff3344;border-color:rgba(255,51,68,.4);box-shadow:0 0 10px rgba(255,51,68,.6)}
.marker-dot.type-movement{background:#ff8822;border-color:rgba(255,136,34,.4);box-shadow:0 0 10px rgba(255,136,34,.6)}
.marker-dot.type-incident{background:#ffcc00;border-color:rgba(255,204,0,.4);box-shadow:0 0 10px rgba(255,204,0,.6)}
.marker-dot.type-naval{background:#00aaff;border-color:rgba(0,170,255,.4);box-shadow:0 0 10px rgba(0,170,255,.6)}
@keyframes mp{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.marker-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,51,68,.25);animation:re 2.5s ease-out infinite}
@keyframes re{0%{width:12px;height:12px;opacity:.7}100%{width:44px;height:44px;opacity:0}}
.leaflet-popup-content-wrapper{background:var(--panel)!important;border:1px solid var(--bdr2)!important;border-radius:6px!important;box-shadow:0 12px 40px rgba(0,0,0,.7)!important}
.leaflet-popup-tip{background:var(--panel)!important;border:1px solid var(--bdr2)!important}
.leaflet-popup-close-button{color:var(--t2)!important;font-size:18px!important}.leaflet-popup-close-button:hover{color:var(--red)!important}
.popup-content{width:280px;padding:4px}
.popup-image{width:100%;height:130px;object-fit:cover;border-radius:4px;margin-bottom:8px;border:1px solid var(--bdr)}
.popup-type{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--red);margin-bottom:5px}
.popup-title{font-size:15px;font-weight:700;color:var(--t3);line-height:1.3;margin-bottom:6px}
.popup-desc{font-size:12px;color:var(--t1);line-height:1.5;margin-bottom:8px}
.popup-meta{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--bdr)}
.popup-time{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2)}
.popup-source{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyn);text-decoration:none}
.popup-source:hover{color:var(--blu)}
.bottom-hud{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:24px;padding:10px 24px;background:var(--panel);border:1px solid var(--bdr);border-radius:8px;backdrop-filter:blur(16px);z-index:1000}
.hud-stat{text-align:center}
.hud-value{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700}
.hud-value.red{color:var(--red)}.hud-value.orange{color:var(--org)}.hud-value.yellow{color:var(--yel)}.hud-value.blue{color:var(--blu)}
.hud-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--t2);margin-top:2px}
.scan-line{position:fixed;top:48px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyn),transparent);opacity:0;z-index:999;pointer-events:none}
.scan-line.active{animation:ss 2s ease-in-out}
@keyframes ss{0%{opacity:0;top:48px}10%{opacity:.7}90%{opacity:.7}100%{opacity:0;top:100vh}}
.coord-display{position:fixed;bottom:56px;right:16px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2);z-index:1000;pointer-events:none}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;transition:opacity .8s ease}
.loading-overlay.fade-out{opacity:0;pointer-events:none}
.loading-text{font-family:'Orbitron',sans-serif;font-size:28px;letter-spacing:10px;color:var(--t3);margin-bottom:24px}
.loading-bar{width:260px;height:2px;background:var(--bdr);border-radius:1px;overflow:hidden}
.loading-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--cyn),var(--blu));transition:width .3s ease}
.loading-status{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--t2);margin-top:16px;letter-spacing:2px}
@media(max-width:768px){.side-panel{width:280px}.side-panel.collapsed+.panel-toggle{left:0}.panel-toggle{left:280px}.logo-sub{display:none}}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-text">SIGINT</div>
  <div class="loading-bar"><div class="loading-bar-fill" id="loadingFill"></div></div>
  <div class="loading-status" id="loadingStatus">INITIALIZING SYSTEMS...</div>
</div>
<div class="scan-line" id="scanLine"></div>
<div class="top-bar">
  <div class="logo"><div class="logo-icon"></div><span class="logo-text">SIGINT</span><span class="logo-sub">GLOBAL MILITARY EVENT TRACKER</span></div>
  <div class="status-bar">
    <div class="status-item"><div class="status-dot" id="statusDot"></div><span id="statusText">AI MONITOR ACTIVE</span></div>
    <div class="status-item">EVENTS: <span class="event-count" id="eventCount">0</span></div>
    <div class="status-item" id="clockDisplay">--:--:-- UTC</div>
  </div>
</div>
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <div class="panel-title">EVENT FEED</div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">ALL</button>
      <button class="filter-btn" data-filter="airstrike" onclick="setFilter('airstrike')">AIRSTRIKE</button>
      <button class="filter-btn" data-filter="movement" onclick="setFilter('movement')">MOVEMENT</button>
      <button class="filter-btn" data-filter="incident" onclick="setFilter('incident')">INCIDENT</button>
      <button class="filter-btn" data-filter="naval" onclick="setFilter('naval')">NAVAL</button>
    </div>
  </div>
  <div class="event-list" id="eventList"></div>
</div>
<div class="panel-toggle" id="panelToggle" onclick="togglePanel()">&laquo;</div>
<div class="vignette"></div>
<div class="coord-display" id="coordDisplay">LAT: 0.0000 | LNG: 0.0000</div>
<div id="map"><div class="grid-overlay"></div></div>
<div class="bottom-hud">
  <div class="hud-stat"><div class="hud-value red" id="hudAirstrikes">0</div><div class="hud-label">AIRSTRIKES</div></div>
  <div class="hud-stat"><div class="hud-value orange" id="hudMovements">0</div><div class="hud-label">MOVEMENTS</div></div>
  <div class="hud-stat"><div class="hud-value yellow" id="hudIncidents">0</div><div class="hud-label">INCIDENTS</div></div>
  <div class="hud-stat"><div class="hud-value blue" id="hudNaval">0</div><div class="hud-label">NAVAL</div></div>
</div>
<script>
const API_BASE='';
const WORLD_GEO='https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json';
const DEMO_EVENTS=[
{id:1,type:'airstrike',title:'Russian drone strike hits residential area in Kharkiv',description:'Shahed-type drones struck a residential block overnight. Multiple casualties reported.',lat:49.9935,lng:36.2304,location:'Kharkiv, Ukraine',time:'2026-03-03T02:14:00Z',source:'https://www.reuters.com/world/europe/russian-drones-strike-kharkiv',sourceName:'Reuters',image:''},
{id:2,type:'movement',title:'NATO deploys troops to Polish-Belarusian border',description:'Reinforced battalion moved to eastern Poland with armored vehicles and air defense.',lat:52.1,lng:23.5,location:'Podlasie, Poland',time:'2026-03-03T06:30:00Z',source:'https://www.bbc.com/news/world-europe',sourceName:'BBC News',image:''},
{id:3,type:'incident',title:'Military transport plane crashes near Juba',description:'AN-26 crashed after takeoff from Juba International Airport. 7 crew on board.',lat:4.87,lng:31.611,location:'Juba, South Sudan',time:'2026-03-03T08:45:00Z',source:'https://www.aljazeera.com/news',sourceName:'Al Jazeera',image:''},
{id:4,type:'naval',title:'PLA Navy exercises near Taiwan Strait',description:'Large-scale exercises with 12+ warships and submarines per satellite analysis.',lat:24.5,lng:119.5,location:'Taiwan Strait',time:'2026-03-03T04:00:00Z',source:'https://www.reuters.com/world/asia-pacific',sourceName:'Reuters',image:''},
{id:5,type:'airstrike',title:'Israeli airstrike on weapons depot in Syria',description:'IAF struck arms storage near Syrian-Jordanian border.',lat:32.6,lng:36.1,location:'Daraa, Syria',time:'2026-03-02T23:30:00Z',source:'https://www.timesofisrael.com',sourceName:'Times of Israel',image:''},
{id:6,type:'naval',title:'Houthi missile strike on vessel in Red Sea',description:'Cargo vessel hit in southern Red Sea. Ship damaged but sailing.',lat:13.5,lng:42.5,location:'Red Sea, off Yemen',time:'2026-03-03T07:20:00Z',source:'https://www.reuters.com/world/middle-east',sourceName:'Reuters',image:''}
];

let map,markers=[],events=[],currentFilter='all';

function runLoadingSequence(){
  const fill=document.getElementById('loadingFill'),status=document.getElementById('loadingStatus'),overlay=document.getElementById('loadingOverlay');
  const steps=[{pct:12,text:'ESTABLISHING UPLINK...'},{pct:28,text:'LOADING TERRAIN DATA...'},{pct:48,text:'RENDERING WORLD MAP...'},{pct:65,text:'INITIALIZING AI MODULE...'},{pct:82,text:'SCANNING NEWS FEEDS...'},{pct:95,text:'PLOTTING COORDINATES...'},{pct:100,text:'SYSTEM ONLINE'}];
  let i=0;const iv=setInterval(()=>{if(i<steps.length){fill.style.width=steps[i].pct+'%';status.textContent=steps[i].text;i++}else{clearInterval(iv);setTimeout(()=>{overlay.classList.add('fade-out');setTimeout(()=>overlay.remove(),800);initApp()},400)}},320);
}

async function initApp(){initMap();loadWorldMap().catch(()=>{});fetchEvents();startClock();setInterval(fetchEvents,60000)}

function initMap(){
  map=L.map('map',{center:[20,20],zoom:3,zoomControl:false,attributionControl:false,minZoom:2,maxZoom:10,worldCopyJump:true});
  map.getContainer().style.background='#1a1d23';
  map.on('mousemove',(e)=>{document.getElementById('coordDisplay').textContent=`LAT: ${e.latlng.lat.toFixed(4)} | LNG: ${e.latlng.lng.toFixed(4)}`});
}

async function loadWorldMap(){
  try{
    const res=await fetch(WORLD_GEO);const data=await res.json();
    L.geoJSON(data,{
      style:{fillColor:'#2f3640',fillOpacity:1,color:'#3d4654',weight:0.5,opacity:0.7},
      onEachFeature:function(f,layer){
        layer.on('mouseover',function(){this.setStyle({fillColor:'#3a4250',color:'#4a5568'})});
        layer.on('mouseout',function(){this.setStyle({fillColor:'#2f3640',color:'#3d4654'})});
      }
    }).addTo(map);
  }catch(e){
    document.querySelector('.leaflet-tile-pane').style.display='';
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{subdomains:'abcd'}).addTo(map);
  }
}

async function fetchEvents(){
  triggerScanAnimation();
  try{
    const r=await fetch('/api/scan');
    if(r.ok){const d=await r.json();if(d.events&&d.events.length>0){loadEvents(d.events);return}}
  }catch(e){console.warn('Fetch failed:',e)}
  loadEvents(DEMO_EVENTS);
}

function loadEvents(data){
  events=data.map((e,i)=>({...e,id:e.id||i+1})).sort((a,b)=>new Date(b.time)-new Date(a.time));
  renderMarkers();renderEventList();updateHUD();
  document.getElementById('eventCount').textContent=events.length;
}

function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  const filtered=currentFilter==='all'?events:events.filter(e=>e.type===currentFilter);
  filtered.forEach((ev,i)=>{
    setTimeout(()=>{
      const icon=L.divIcon({className:'event-marker',html:`<div class="marker-ring" style="border-color:${getTypeColor(ev.type)}33"></div><div class="marker-dot type-${ev.type}"></div>`,iconSize:[12,12],iconAnchor:[6,6]});
      const m=L.marker([ev.lat,ev.lng],{icon}).addTo(map);
      const img=ev.image?`<img class="popup-image" src="${ev.image}" alt="" onerror="this.style.display='none'"/>`:'';
      m.bindPopup(`<div class="popup-content">${img}<div class="popup-type">${ev.type.toUpperCase()}</div><div class="popup-title">${ev.title}</div><div class="popup-desc">${ev.description}</div><div class="popup-meta"><span class="popup-time">${formatTime(ev.time)}</span><a class="popup-source" href="${ev.source}" target="_blank">${ev.sourceName||'Source'} &#8599;</a></div></div>`,{maxWidth:300});
      markers.push(m);
    },i*80);
  });
}

function renderEventList(){
  const list=document.getElementById('eventList');
  const filtered=currentFilter==='all'?events:events.filter(e=>e.type===currentFilter);
  list.innerHTML=filtered.map(ev=>`<div class="event-card type-${ev.type}" onclick="flyToEvent(${ev.id})"><div class="event-card-header"><span class="event-type-badge ${ev.type}">${ev.type.toUpperCase()}</span><span class="event-time">${formatTime(ev.time)}</span></div><div class="event-card-title">${ev.title}</div><div class="event-card-location">&#8982; ${ev.location}</div></div>`).join('');
}

function flyToEvent(id){
  const ev=events.find(e=>e.id===id);if(!ev)return;
  map.flyTo([ev.lat,ev.lng],6,{duration:1});
  const filtered=currentFilter==='all'?events:events.filter(e=>e.type===currentFilter);
  const idx=filtered.findIndex(e=>e.id===id);
  if(idx>=0&&markers[idx])setTimeout(()=>markers[idx].openPopup(),1100);
}

function updateHUD(){
  document.getElementById('hudAirstrikes').textContent=events.filter(e=>e.type==='airstrike').length;
  document.getElementById('hudMovements').textContent=events.filter(e=>e.type==='movement').length;
  document.getElementById('hudIncidents').textContent=events.filter(e=>e.type==='incident').length;
  document.getElementById('hudNaval').textContent=events.filter(e=>e.type==='naval').length;
}

function setFilter(f){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));renderMarkers();renderEventList()}
function togglePanel(){const p=document.getElementById('sidePanel');p.classList.toggle('collapsed');document.getElementById('panelToggle').innerHTML=p.classList.contains('collapsed')?'&raquo;':'&laquo;'}
function formatTime(iso){const m=Math.floor((Date.now()-new Date(iso))/60000);if(m<60)return`${m}m ago`;const h=Math.floor(m/60);if(h<24)return`${h}h ago`;return new Date(iso).toISOString().slice(0,16).replace('T',' ')+' UTC'}
function getTypeColor(t){return{airstrike:'#ff3344',movement:'#ff8822',incident:'#ffcc00',naval:'#00aaff'}[t]||'#00eedd'}
function startClock(){const tick=()=>document.getElementById('clockDisplay').textContent=new Date().toISOString().slice(11,19)+' UTC';tick();setInterval(tick,1000)}
function triggerScanAnimation(){const d=document.getElementById('statusDot'),t=document.getElementById('statusText'),l=document.getElementById('scanLine');d.classList.add('scanning');t.textContent='SCANNING SOURCES...';l.classList.add('active');setTimeout(()=>{d.classList.remove('scanning');t.textContent='AI MONITOR ACTIVE';l.classList.remove('active')},3000)}

runLoadingSequence();
</script>
</body>
</html>
