<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGINT // Global Military Event Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0c10;
    --bg-secondary: #111520;
    --bg-panel: rgba(12, 16, 24, 0.92);
    --border: #1a2235;
    --border-glow: #2a3a55;
    --accent-red: #ff3344;
    --accent-orange: #ff8822;
    --accent-yellow: #ffcc00;
    --accent-blue: #00aaff;
    --accent-green: #00ff88;
    --accent-cyan: #00eedd;
    --text-primary: #c8d0e0;
    --text-dim: #556680;
    --text-bright: #e8eef8;
    --scanline: rgba(0, 170, 255, 0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* === MAP === */
  #map {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: #0d1117;
  }

  .leaflet-tile-pane { opacity: 1; }
  .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }

  /* === GRID OVERLAY ON MAP === */
  .grid-overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(0,170,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,170,255,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* === TOP BAR === */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 1000;
    backdrop-filter: blur(12px);
  }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-icon {
    width: 32px; height: 32px;
    border: 2px solid var(--accent-red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: pulse-border 2s ease-in-out infinite;
  }
  .logo-icon::before { content: '⬡'; color: var(--accent-red); font-size: 14px; }

  @keyframes pulse-border {
    0%, 100% { border-color: var(--accent-red); box-shadow: 0 0 8px rgba(255,51,68,0.3); }
    50% { border-color: var(--accent-orange); box-shadow: 0 0 16px rgba(255,51,68,0.5); }
  }

  .logo-text { font-family: 'Orbitron', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 4px; color: var(--text-bright); }
  .logo-sub { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; margin-left: 12px; }

  .status-bar { display: flex; align-items: center; gap: 24px; }
  .status-item { display: flex; align-items: center; gap: 6px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-dim); }

  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); animation: blink 1.5s ease-in-out infinite; }
  .status-dot.scanning { background: var(--accent-orange); animation: blink 0.5s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .event-count { font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--accent-cyan); }

  /* === SIDE PANEL === */
  .side-panel {
    position: fixed;
    top: 52px; left: 0; bottom: 0;
    width: 340px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    z-index: 1000;
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
  }
  .side-panel.collapsed { transform: translateX(-340px); }

  .panel-toggle {
    position: fixed; top: 64px; left: 340px; z-index: 1001;
    width: 28px; height: 48px;
    background: var(--bg-panel); border: 1px solid var(--border); border-left: none;
    border-radius: 0 6px 6px 0;
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; transition: all 0.3s ease;
  }
  .panel-toggle:hover { color: var(--accent-cyan); border-color: var(--accent-cyan); }
  .side-panel.collapsed + .panel-toggle { left: 0; }

  .panel-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .panel-title { font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 3px; color: var(--accent-cyan); margin-bottom: 10px; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .filter-btn {
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 3px;
    background: transparent; color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
  }
  .filter-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
  .filter-btn.active { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0,238,221,0.08); }

  .event-list { flex: 1; overflow-y: auto; padding: 8px; }
  .event-list::-webkit-scrollbar { width: 4px; }
  .event-list::-webkit-scrollbar-track { background: transparent; }
  .event-list::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 2px; }

  .event-card {
    padding: 12px; border: 1px solid var(--border); border-left: 3px solid var(--accent-red);
    border-radius: 4px; margin-bottom: 6px; cursor: pointer;
    transition: all 0.2s; background: rgba(10, 12, 16, 0.6);
  }
  .event-card:hover { background: rgba(20, 28, 44, 0.8); border-color: var(--border-glow); }
  .event-card.type-airstrike { border-left-color: var(--accent-red); }
  .event-card.type-movement { border-left-color: var(--accent-orange); }
  .event-card.type-incident { border-left-color: var(--accent-yellow); }
  .event-card.type-naval { border-left-color: var(--accent-blue); }
  .event-card.type-other { border-left-color: var(--accent-cyan); }

  .event-card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px; }

  .event-type-badge {
    font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 2px;
    padding: 2px 6px; border-radius: 2px;
    background: rgba(255,51,68,0.15); color: var(--accent-red);
  }
  .event-type-badge.movement { background: rgba(255,136,34,0.15); color: var(--accent-orange); }
  .event-type-badge.incident { background: rgba(255,204,0,0.15); color: var(--accent-yellow); }
  .event-type-badge.naval { background: rgba(0,170,255,0.15); color: var(--accent-blue); }

  .event-time { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .event-card-title { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-bright); line-height: 1.3; margin-bottom: 4px; }
  .event-card-location { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); }

  /* === MAP MARKERS === */
  .event-marker { position: relative; cursor: pointer; }

  .marker-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent-red); border: 2px solid rgba(255,51,68,0.5);
    box-shadow: 0 0 12px rgba(255,51,68,0.6), 0 0 24px rgba(255,51,68,0.3);
    animation: marker-pulse 2s ease-in-out infinite;
  }
  .marker-dot.type-airstrike { background: var(--accent-red); border-color: rgba(255,51,68,0.5); box-shadow: 0 0 12px rgba(255,51,68,0.6); }
  .marker-dot.type-movement { background: var(--accent-orange); border-color: rgba(255,136,34,0.5); box-shadow: 0 0 12px rgba(255,136,34,0.6); }
  .marker-dot.type-incident { background: var(--accent-yellow); border-color: rgba(255,204,0,0.5); box-shadow: 0 0 12px rgba(255,204,0,0.6); }
  .marker-dot.type-naval { background: var(--accent-blue); border-color: rgba(0,170,255,0.5); box-shadow: 0 0 12px rgba(0,170,255,0.6); }
  .marker-dot.type-other { background: var(--accent-cyan); border-color: rgba(0,238,221,0.5); box-shadow: 0 0 12px rgba(0,238,221,0.6); }

  @keyframes marker-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

  .marker-ring {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,51,68,0.3);
    animation: ring-expand 2.5s ease-out infinite;
  }
  @keyframes ring-expand { 0% { width: 14px; height: 14px; opacity: 0.8; } 100% { width: 50px; height: 50px; opacity: 0; } }

  /* === POPUP === */
  .leaflet-popup-content-wrapper {
    background: var(--bg-panel) !important; border: 1px solid var(--border-glow) !important;
    border-radius: 6px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 1px var(--accent-cyan) !important;
  }
  .leaflet-popup-tip { background: var(--bg-panel) !important; border: 1px solid var(--border-glow) !important; }
  .leaflet-popup-close-button { color: var(--text-dim) !important; font-size: 18px !important; }
  .leaflet-popup-close-button:hover { color: var(--accent-red) !important; }

  .popup-content { width: 280px; padding: 4px; }
  .popup-image { width: 100%; height: 140px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; border: 1px solid var(--border); }
  .popup-type { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--accent-red); margin-bottom: 6px; }
  .popup-title { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: var(--text-bright); line-height: 1.3; margin-bottom: 8px; }
  .popup-desc { font-size: 12px; color: var(--text-primary); line-height: 1.5; margin-bottom: 10px; }
  .popup-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid var(--border); }
  .popup-time { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .popup-source { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--accent-cyan); text-decoration: none; }
  .popup-source:hover { color: var(--accent-blue); }

  /* === BOTTOM HUD === */
  .bottom-hud {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 24px; padding: 10px 24px;
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: 8px; backdrop-filter: blur(12px); z-index: 1000;
  }
  .hud-stat { text-align: center; }
  .hud-value { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-bright); }
  .hud-value.red { color: var(--accent-red); }
  .hud-value.orange { color: var(--accent-orange); }
  .hud-value.yellow { color: var(--accent-yellow); }
  .hud-value.blue { color: var(--accent-blue); }
  .hud-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--text-dim); margin-top: 2px; }

  /* === SCAN LINE === */
  .scan-line { position: fixed; top: 52px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent); opacity: 0; z-index: 999; pointer-events: none; }
  .scan-line.active { animation: scan-sweep 2s ease-in-out; }
  @keyframes scan-sweep { 0% { opacity: 0; top: 52px; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { opacity: 0; top: 100vh; } }

  /* === COORD DISPLAY === */
  .coord-display { position: fixed; bottom: 60px; right: 16px; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); z-index: 1000; pointer-events: none; }

  /* === CORNER MARKERS === */
  .corner-marker { position: fixed; width: 20px; height: 20px; z-index: 998; pointer-events: none; }
  .corner-marker.tl { top: 56px; left: 344px; border-top: 2px solid var(--border-glow); border-left: 2px solid var(--border-glow); }
  .corner-marker.tr { top: 56px; right: 4px; border-top: 2px solid var(--border-glow); border-right: 2px solid var(--border-glow); }
  .corner-marker.bl { bottom: 4px; left: 344px; border-bottom: 2px solid var(--border-glow); border-left: 2px solid var(--border-glow); }
  .corner-marker.br { bottom: 4px; right: 4px; border-bottom: 2px solid var(--border-glow); border-right: 2px solid var(--border-glow); }

  /* === LOADING === */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg-primary);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10000; transition: opacity 0.8s ease;
  }
  .loading-overlay.fade-out { opacity: 0; pointer-events: none; }
  .loading-text { font-family: 'Orbitron', sans-serif; font-size: 24px; letter-spacing: 8px; color: var(--text-bright); margin-bottom: 24px; }
  .loading-bar { width: 240px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .loading-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); transition: width 0.3s ease; }
  .loading-status { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 16px; letter-spacing: 2px; }

  @media (max-width: 768px) {
    .side-panel { width: 280px; }
    .side-panel.collapsed + .panel-toggle { left: 0; }
    .panel-toggle { left: 280px; }
    .bottom-hud { gap: 16px; padding: 8px 16px; }
    .logo-sub { display: none; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-text">SIGINT</div>
  <div class="loading-bar"><div class="loading-bar-fill" id="loadingFill"></div></div>
  <div class="loading-status" id="loadingStatus">INITIALIZING SYSTEMS...</div>
</div>

<div class="scan-line" id="scanLine"></div>

<div class="top-bar">
  <div class="logo">
    <div class="logo-icon"></div>
    <span class="logo-text">SIGINT</span>
    <span class="logo-sub">GLOBAL MILITARY EVENT TRACKER</span>
  </div>
  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">AI MONITOR ACTIVE</span>
    </div>
    <div class="status-item">EVENTS: <span class="event-count" id="eventCount">0</span></div>
    <div class="status-item" id="clockDisplay">--:--:-- UTC</div>
  </div>
</div>

<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <div class="panel-title">EVENT FEED</div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">ALL</button>
      <button class="filter-btn" data-filter="airstrike" onclick="setFilter('airstrike')">AIRSTRIKE</button>
      <button class="filter-btn" data-filter="movement" onclick="setFilter('movement')">MOVEMENT</button>
      <button class="filter-btn" data-filter="incident" onclick="setFilter('incident')">INCIDENT</button>
      <button class="filter-btn" data-filter="naval" onclick="setFilter('naval')">NAVAL</button>
    </div>
  </div>
  <div class="event-list" id="eventList"></div>
</div>
<div class="panel-toggle" id="panelToggle" onclick="togglePanel()">◀</div>

<div class="corner-marker tl"></div>
<div class="corner-marker tr"></div>
<div class="corner-marker bl"></div>
<div class="corner-marker br"></div>

<div class="coord-display" id="coordDisplay">LAT: 0.0000 | LNG: 0.0000</div>

<div id="map"><div class="grid-overlay"></div></div>

<div class="bottom-hud">
  <div class="hud-stat"><div class="hud-value red" id="hudAirstrikes">0</div><div class="hud-label">AIRSTRIKES</div></div>
  <div class="hud-stat"><div class="hud-value orange" id="hudMovements">0</div><div class="hud-label">MOVEMENTS</div></div>
  <div class="hud-stat"><div class="hud-value yellow" id="hudIncidents">0</div><div class="hud-label">INCIDENTS</div></div>
  <div class="hud-stat"><div class="hud-value blue" id="hudNaval">0</div><div class="hud-label">NAVAL</div></div>
</div>

  { id:10, type:'movement', title:'Indian Army repositions units along Line of Actual Control', description:'Indian military sources report redeployment of mountain warfare units to forward positions in Ladakh following Chinese infrastructure construction.', lat:34.15, lng:77.58, location:'Ladakh, India', time:'2026-03-02T20:00:00Z', source:'https://www.reuters.com', sourceName:'Reuters', image:'https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400&h=200&fit=crop' },
  { id:11, type:'incident', title:'Myanmar junta forces shell civilian village in Sagaing', description:'Army artillery struck a village in Sagaing Division, damaging homes and a school. Civilian casualties reported.', lat:21.9, lng:95.97, location:'Sagaing, Myanmar', time:'2026-03-03T05:00:00Z', source:'https://www.aljazeera.com', sourceName:'Al Jazeera', image:'https://images.unsplash.com/photo-1554475900-0615eb18e5a0?w=400&h=200&fit=crop' },
  { id:12, type:'movement', title:'Russian forces rotate units near Zaporizhzhia front', description:'Ukrainian intelligence reports Russian forces cycling fresh units south of Zaporizhzhia with increased logistics from Crimea.', lat:47.15, lng:35.2, location:'Zaporizhzhia, Ukraine', time:'2026-03-03T09:00:00Z', source:'https://www.bbc.com', sourceName:'BBC News', image:'https://images.unsplash.com/photo-1579912437766-7896df6d3cd3?w=400&h=200&fit=crop' }
];

let map, markers = [], events = [], currentFilter = 'all';

// --- LOADING ---
function runLoadingSequence() {
  const fill = document.getElementById('loadingFill');
  const status = document.getElementById('loadingStatus');
  const overlay = document.getElementById('loadingOverlay');
  const steps = [
    { pct: 15, text: 'CONNECTING TO SATELLITE FEEDS...' },
    { pct: 35, text: 'INITIALIZING MAP RENDERER...' },
    { pct: 55, text: 'LOADING AI ANALYSIS MODULE...' },
    { pct: 75, text: 'SCANNING NEWS SOURCES...' },
    { pct: 90, text: 'PLOTTING EVENT COORDINATES...' },
    { pct: 100, text: 'SYSTEM READY' },
  ];
  let i = 0;
  const interval = setInterval(() => {
    if (i < steps.length) { fill.style.width = steps[i].pct + '%'; status.textContent = steps[i].text; i++; }
    else { clearInterval(interval); setTimeout(() => { overlay.classList.add('fade-out'); setTimeout(() => overlay.remove(), 800); initApp(); }, 400); }
  }, 350);
}

// --- INIT ---
function initApp() {
  initMap();
  fetchEvents();
  startClock();
  // Scan every 60 seconds
  setInterval(fetchEvents, 60000);
}

function initMap() {
  map = L.map('map', { center: [25, 30], zoom: 3, zoomControl: false, attributionControl: false, minZoom: 2, maxZoom: 12 });

  // Dark grey tiles — land is grey, water is darker
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', { subdomains: 'abcd' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', opacity: 0.5 }).addTo(map);

  map.on('mousemove', (e) => {
    document.getElementById('coordDisplay').textContent = `LAT: ${e.latlng.lat.toFixed(4)} | LNG: ${e.latlng.lng.toFixed(4)}`;
  });
}

// --- FETCH EVENTS (from backend or demo) ---
async function fetchEvents() {
  triggerScanAnimation();

  try {
    if (API_BASE) {
      const res = await fetch(`${API_BASE}/api/scan`);
      const data = await res.json();
      if (data.events && data.events.length > 0) {
        loadEvents(data.events);
        return;
      }
    }
  } catch (err) {
    console.warn('Backend not available, using demo data:', err.message);
  }

  // Fallback to demo
  loadEvents(DEMO_EVENTS);
}

function loadEvents(data) {
  events = data.map((e, i) => ({ ...e, id: e.id || i + 1 })).sort((a, b) => new Date(b.time) - new Date(a.time));
  renderMarkers();
  renderEventList();
  updateHUD();
  document.getElementById('eventCount').textContent = events.length;
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const filtered = currentFilter === 'all' ? events : events.filter(e => e.type === currentFilter);

  filtered.forEach((event, index) => {
    setTimeout(() => {
      const icon = L.divIcon({
        className: 'event-marker',
        html: `<div class="marker-ring" style="border-color:${getTypeColor(event.type)}33"></div><div class="marker-dot type-${event.type}"></div>`,
        iconSize: [14, 14], iconAnchor: [7, 7]
      });
      const marker = L.marker([event.lat, event.lng], { icon }).addTo(map);
      const imgTag = event.image ? `<img class="popup-image" src="${event.image}" alt="" onerror="this.style.display='none'"/>` : '';
      marker.bindPopup(`
        <div class="popup-content">
          ${imgTag}
          <div class="popup-type">${event.type.toUpperCase()}</div>
          <div class="popup-title">${event.title}</div>
          <div class="popup-desc">${event.description}</div>
          <div class="popup-meta">
            <span class="popup-time">${formatTime(event.time)}</span>
            <a class="popup-source" href="${event.source}" target="_blank">${event.sourceName || 'Source'} ↗</a>
          </div>
        </div>
      `, { maxWidth: 300 });
      markers.push(marker);
    }, index * 100);
  });
}

function renderEventList() {
  const list = document.getElementById('eventList');
  const filtered = currentFilter === 'all' ? events : events.filter(e => e.type === currentFilter);
  list.innerHTML = filtered.map(event => `
    <div class="event-card type-${event.type}" onclick="flyToEvent(${event.id})">
      <div class="event-card-header">
        <span class="event-type-badge ${event.type}">${event.type.toUpperCase()}</span>
        <span class="event-time">${formatTime(event.time)}</span>
      </div>
      <div class="event-card-title">${event.title}</div>
      <div class="event-card-location">⌖ ${event.location}</div>
    </div>
  `).join('');
}

function flyToEvent(id) {
  const event = events.find(e => e.id === id);
  if (!event) return;
  map.flyTo([event.lat, event.lng], 7, { duration: 1.2 });
  const filtered = currentFilter === 'all' ? events : events.filter(e => e.type === currentFilter);
  const idx = filtered.findIndex(e => e.id === id);
  if (idx >= 0 && markers[idx]) setTimeout(() => markers[idx].openPopup(), 1300);
}

function updateHUD() {
  document.getElementById('hudAirstrikes').textContent = events.filter(e => e.type === 'airstrike').length;
  document.getElementById('hudMovements').textContent = events.filter(e => e.type === 'movement').length;
  document.getElementById('hudIncidents').textContent = events.filter(e => e.type === 'incident').length;
  document.getElementById('hudNaval').textContent = events.filter(e => e.type === 'naval').length;
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.filter === filter));
  renderMarkers();
  renderEventList();
}

function togglePanel() {
  const panel = document.getElementById('sidePanel');
  panel.classList.toggle('collapsed');
  document.getElementById('panelToggle').textContent = panel.classList.contains('collapsed') ? '▶' : '◀';
}

function formatTime(iso) {
  const diffM = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (diffM < 60) return `${diffM}m ago`;
  const diffH = Math.floor(diffM / 60);
  if (diffH < 24) return `${diffH}h ago`;
  return new Date(iso).toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
}

function getTypeColor(type) {
  return { airstrike:'#ff3344', movement:'#ff8822', incident:'#ffcc00', naval:'#00aaff', other:'#00eedd' }[type] || '#00eedd';
}

function startClock() {
  const tick = () => { document.getElementById('clockDisplay').textContent = new Date().toISOString().slice(11, 19) + ' UTC'; };
  tick(); setInterval(tick, 1000);
}

function triggerScanAnimation() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const line = document.getElementById('scanLine');
  dot.classList.add('scanning'); text.textContent = 'SCANNING SOURCES...'; line.classList.add('active');
  setTimeout(() => { dot.classList.remove('scanning'); text.textContent = 'AI MONITOR ACTIVE'; line.classList.remove('active'); }, 3000);
}

runLoadingSequence();
</script>
</body>
</html>
